<div class="auth-page-v2">
  <!-- Left Section: Branding & Info -->
  <div class="branding-section">
    <div class="brand-content">
      <div class="logo" routerLink="/">
        <i class="fas fa-graduation-cap"></i>
        <span>UniGuide</span>
      </div>
      <h1>Account Recovery</h1>
      <p>Don't worry, it happens to the best of us. Just enter your email and we'll help you get back on track.</p>
      
      <div class="feature-pills">
        <div class="pill"><i class="fas fa-magic"></i> Quick Recovery</div>
        <div class="pill"><i class="fas fa-user-shield"></i> Secure Reset</div>
        <div class="pill"><i class="fas fa-headset"></i> 24/7 Support</div>
      </div>
    </div>
    <div class="brand-bg-glow"></div>
  </div>

  <!-- Right Section: Form -->
  <div class="form-section">
    <div class="form-container">
      <div class="form-header">
        <div class="icon-circle">
          <i class="fas fa-key"></i>
        </div>
        <h2>Forgot Password?</h2>
        <p>No stress! Enter your email to reset it.</p>
      </div>

      <form class="auth-form">
        <div class="wave-group">
          <input required type="email" class="input">
          <span class="bar"></span>
          <label class="label">
            <span *ngFor="let char of getLabelChars('Email Address'); let i = index" class="label-char" [style.--index]="i">{{ char }}</span>
          </label>
        </div>

        <button type="submit" class="submit-btn" routerLink="/auth/otp">Send Reset Link</button>

        <p class="footer-text">
          Remember your password? <a routerLink="/auth/login">Sign in</a>
        </p>
      </form>
    </div>
  </div>
</div>
